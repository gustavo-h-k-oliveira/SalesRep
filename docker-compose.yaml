services:

  db:
    image: postgres:18.4

    container_name: salesrep-db

    restart: unless-stopped

    environment:
      POSTGRES_DB: salesrep
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend

    container_name: salesrep-api

    restart: unless-stopped

    depends_on:
      - db

    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/salesrep}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}

    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend

    container_name: salesrep-web

    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "3000:80"

volumes:
  postgres_data:
